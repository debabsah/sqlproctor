name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Seed the demo database
        run: python examples/seed.py
      - name: Test
        run: python -m pytest -q
      - name: Benchmark (smoke)
        run: python demo/eval.py
      - name: Demo (smoke)
        run: python demo/demo.py
      - name: Pass-through demo (smoke)
        run: python demo/passthrough_demo.py
      - name: Live-eval plumbing (offline self-test, no API key)
        run: python demo/live_eval.py --selftest
