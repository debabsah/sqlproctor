# Semantic contract for the demo retail schema.
# tables/columns/pk/joins here match what `sqlproctor bootstrap` generates from the
# seeded DuckDB; the required_filters and metrics below are the curated delta
# (they cannot be inferred from schema alone).
version: v1

tables:
  orders:
    pk: order_id
    columns: [order_id, customer_id, ordered_at, status, deleted_at]
    required_filters:
      - {column: deleted_at, op: "IS NULL"}   # curated: soft-deleted orders are not real sales
  order_items:
    pk: item_id
    columns: [item_id, order_id, product_id, net_amount, quantity]
  customers:
    pk: customer_id
    columns: [customer_id, region, created_at]
  shipments:
    pk: shipment_id
    columns: [shipment_id, order_id, carrier, shipped_at]

joins:
  - [orders, order_id, order_items, order_id]
  - [orders, customer_id, customers, customer_id]
  - [orders, order_id, shipments, order_id]

metrics:
  # curated: revenue is net_amount summed at the order_item grain. Summing it while
  # joined to another child of orders (e.g. shipments) multiplies the rows; summing
  # it without going through active orders counts soft-deleted orders' revenue.
  - {name: revenue, agg: SUM, table: order_items, column: net_amount, grain: order_item,
     requires_filters: [{table: orders, column: deleted_at, op: "IS NULL"}],
     description: "Net sales revenue = sum of order_items.net_amount over active orders"}
