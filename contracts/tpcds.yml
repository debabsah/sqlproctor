# Semantic contract for the TPC-DS store channel (the industry-standard analytics
# benchmark, generated by DuckDB's tpcds extension). Six tables: two facts
# (store_sales, store_returns) and four conformed dimensions (item, customer,
# date_dim, store). Columns mirror the dsdgen output exactly so legitimate queries
# do not trip SURFACE.
#
# Modeling note: TPC-DS facts have composite keys, but sqlproctor's `pk` is a single
# column and fan-out is inferred from the PARENT's pk. So the dimensions are the
# parents (pk = their surrogate `_sk`), the facts are children joining on that `_sk`,
# and each fact is given a nominal single-column `pk` (its ticket number) that no
# join uses as a parent key. Because store_sales and store_returns are both children
# of every dimension, joining a dimension to both facts and summing a measure fires
# FAN_OUT. Fact-to-fact edges are deliberately NOT declared, so a direct
# store_sales-to-store_returns join trips JOIN_PATH (aggregate each fact to a common
# grain first). TPC-DS has no soft-delete convention, so there are no required_filters
# here; the REQUIRED_FILTER check is exercised by the real-data complement (BIRD/Olist).
version: tpcds-v1

tables:
  store_sales:
    pk: ss_ticket_number
    columns: [ss_sold_date_sk, ss_sold_time_sk, ss_item_sk, ss_customer_sk, ss_cdemo_sk,
              ss_hdemo_sk, ss_addr_sk, ss_store_sk, ss_promo_sk, ss_ticket_number,
              ss_quantity, ss_wholesale_cost, ss_list_price, ss_sales_price,
              ss_ext_discount_amt, ss_ext_sales_price, ss_ext_wholesale_cost,
              ss_ext_list_price, ss_ext_tax, ss_coupon_amt, ss_net_paid,
              ss_net_paid_inc_tax, ss_net_profit]
  store_returns:
    pk: sr_ticket_number
    columns: [sr_returned_date_sk, sr_return_time_sk, sr_item_sk, sr_customer_sk,
              sr_cdemo_sk, sr_hdemo_sk, sr_addr_sk, sr_store_sk, sr_reason_sk,
              sr_ticket_number, sr_return_quantity, sr_return_amt, sr_return_tax,
              sr_return_amt_inc_tax, sr_fee, sr_return_ship_cost, sr_refunded_cash,
              sr_reversed_charge, sr_store_credit, sr_net_loss]
  item:
    pk: i_item_sk
    columns: [i_item_sk, i_item_id, i_rec_start_date, i_rec_end_date, i_item_desc,
              i_current_price, i_wholesale_cost, i_brand_id, i_brand, i_class_id,
              i_class, i_category_id, i_category, i_manufact_id, i_manufact, i_size,
              i_formulation, i_color, i_units, i_container, i_manager_id, i_product_name]
  customer:
    pk: c_customer_sk
    columns: [c_customer_sk, c_customer_id, c_current_cdemo_sk, c_current_hdemo_sk,
              c_current_addr_sk, c_first_shipto_date_sk, c_first_sales_date_sk,
              c_salutation, c_first_name, c_last_name, c_preferred_cust_flag,
              c_birth_day, c_birth_month, c_birth_year, c_birth_country, c_login,
              c_email_address, c_last_review_date_sk]
  date_dim:
    pk: d_date_sk
    columns: [d_date_sk, d_date_id, d_date, d_month_seq, d_week_seq, d_quarter_seq,
              d_year, d_dow, d_moy, d_dom, d_qoy, d_fy_year, d_fy_quarter_seq,
              d_fy_week_seq, d_day_name, d_quarter_name, d_holiday, d_weekend,
              d_following_holiday, d_first_dom, d_last_dom, d_same_day_ly, d_same_day_lq,
              d_current_day, d_current_week, d_current_month, d_current_quarter,
              d_current_year]
  store:
    pk: s_store_sk
    columns: [s_store_sk, s_store_id, s_rec_start_date, s_rec_end_date, s_closed_date_sk,
              s_store_name, s_number_employees, s_floor_space, s_hours, s_manager,
              s_market_id, s_geography_class, s_market_desc, s_market_manager,
              s_division_id, s_division_name, s_company_id, s_company_name,
              s_street_number, s_street_name, s_street_type, s_suite_number, s_city,
              s_county, s_state, s_zip, s_country, s_gmt_offset, s_tax_percentage]

joins:
  # parent PK first: each dimension is a parent of BOTH facts (that is the fan-out surface)
  - [item, i_item_sk, store_sales, ss_item_sk]
  - [item, i_item_sk, store_returns, sr_item_sk]
  - [customer, c_customer_sk, store_sales, ss_customer_sk]
  - [customer, c_customer_sk, store_returns, sr_customer_sk]
  - [date_dim, d_date_sk, store_sales, ss_sold_date_sk]
  - [date_dim, d_date_sk, store_returns, sr_returned_date_sk]
  - [store, s_store_sk, store_sales, ss_store_sk]
  - [store, s_store_sk, store_returns, sr_store_sk]

metrics:
  # curated: store revenue is net paid at the store_sales line grain. Summing it while
  # a sibling fact (store_returns) is joined via a shared dimension multiplies the rows;
  # aliasing a different sales column (ss_ext_sales_price, ss_net_paid_inc_tax) as
  # store_revenue reports a different quantity under the metric's name.
  - {name: store_revenue, agg: SUM, table: store_sales, column: ss_net_paid, grain: line_item,
     description: "Store revenue = sum of store_sales.ss_net_paid at the sale-line grain"}
